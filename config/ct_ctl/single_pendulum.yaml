state_dim: 2
action_dim: 1
n_total_steps: 100
n_steps_per_control: 5 
step_size: 0.01

init_remainder: 0.1
frr_rounds: 10
frr_stop_ratio: 0.95
sr_window_size: 1000
sim_n_samples: 64

variable_names: [x1, x2, u1]
dynamics: "models/dynamics/ct_ctl/single_pendulum.py"
controller: "models/controllers/ct_ctl/single_pendulum.onnx"

initial_set:
  - [1.0, 1.175]   # x1
  - [0.0, 0.2]     # x2
  - [0.0, 0.0]     # u1 (fixed)

# splits: {0: 8, 1: 8}

output_dir: "output/ct_ctl/single_pendulum"

visualization:
  vis_stride: 1
  aggregate_partitions: true
