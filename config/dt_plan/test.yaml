state_dim: 2
action_dim: 2
nn_dyn: true
n_total_steps: 20
step_size: 1
n_steps_per_plan: 1
discrete: true

# Optional open-loop action plan. If omitted, a zero action sequence is used.
# Expected shape: (n_plan_steps, action_dim), with n_plan fixed to 1 in the launcher.
# action_seq:
#   - [0.0, 0.0]
#   - [0.0, 0.0]
#   ...

sr_window_size: 1000
sim_n_samples: 64

variable_names: [x1, x2, u1, u2]
# dynamics: "models/dynamics/dt_plan/test.py"
dynamics: "models/dynamics/dt_plan/test.onnx"

initial_set:
  - [-0.4, -0.3]  # x1
  - [-0.4, -0.3]  # x2
  - [0.0, 0.0]    # u1 (fixed)
  - [0.0, 0.0]    # u2 (fixed)
# splits: {0: 4}

output_dir: "output/dt_plan/test"

visualization:
  vis_stride: 1
  aggregate_partitions: true
  # draw_dims: [0, 1]
