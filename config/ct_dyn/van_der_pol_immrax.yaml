state_dim: 2
action_dim: 0
n_total_steps: 1000
step_size: 0.01

# engine: 'immrax'

init_remainder: 1e-2
frr_rounds: 10
frr_stop_ratio: 0.95
sr_window_size: 1000
sim_n_samples: 64

variable_names: [x1, x2]
dynamics: "models/dynamics/ct_dyn/van_der_pol.py"

initial_set:
  - [1.10, 1.40]  # x1
  - [2.35, 2.45]  # x2

splits: {0: 4, 1: 4}

output_dir: "output/ct_dyn/van_der_pol"

visualization:
  vis_stride: 1
  aggregate_partitions: true
  draw_dims: [0, 1]