state_dim: 2
action_dim: 2
nn_dyn: true
n_total_steps: 20
n_steps_per_control: 1
step_size: 1
discrete: true

sr_window_size: 1000
sim_n_samples: 64

variable_names: [x1, x2, u1, u2]
# dynamics: "models/dynamics/dt_ctl/test.py"
dynamics: "models/dynamics/dt_ctl/test.onnx"
controller: "models/controllers/dt_ctl/test.onnx"

initial_set:
  - [-0.4, -0.3]  # x1
  - [-0.4, -0.3]  # x2
  - [0.0, 0.0]    # u1 (fixed)
  - [0.0, 0.0]    # u2 (fixed)
# splits: {0: 4}

output_dir: "output/dt_ctl/test"

visualization:
  vis_stride: 1
  aggregate_partitions: true
  # draw_dims: [0, 1]